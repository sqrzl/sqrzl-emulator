openapi: 3.1.0
info:
  title: Sqrzl Emulator Admin API
  version: 1.0.0
  license:
    name: Apache License 2.0
    identifier: Apache-2.0
  summary: Versioned storage administration API for the Sqrzl emulator.
  description: >-
    The admin API provides a RESTful JSON control plane for browsing and
    manipulating emulator-backed storage resources. It is intentionally
    separate from the S3, Azure Blob Storage, Google Cloud Storage, and OCI
    compatibility front doors.

    Version 1 covers bucket, object, ACL, policy, lifecycle, multipart upload,
    and version administration for local development workflows.
servers:
  - url: /admin/v1
    description: Admin API root on the current host
security:
  - AdminSessionCookie: []
tags:
  - name: Auth
    description: Authentication session management.
  - name: Buckets
    description: Bucket-level storage administration operations.
  - name: Objects
    description: Object metadata and binary content operations.
  - name: Tags
    description: Object tagging operations.
paths:
  /auth/login:
    post:
      security: []
      tags:
        - Auth
      operationId: loginAdminSession
      summary: Create admin session
      description: Exchanges admin credentials for an HttpOnly session cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Session created successfully.
          headers:
            Set-Cookie:
              description: HttpOnly admin session cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/InvalidCredentials'
        '500':
          $ref: '#/components/responses/InternalError'
  /auth/logout:
    post:
      security: []
      tags:
        - Auth
      operationId: logoutAdminSession
      summary: Clear admin session
      description: Clears the admin session cookie for the current browser.
      responses:
        '200':
          description: Session cleared successfully.
          headers:
            Set-Cookie:
              description: Expired admin session cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /auth/session:
    get:
      security:
        - AdminSessionCookie: []
        - {}
      tags:
        - Auth
      operationId: getAdminSession
      summary: Get admin session status
      description: >-
        Resolves whether the current browser request is operating through an
        authenticated session or an open local-development admin API
        configuration.
      responses:
        '200':
          description: Session status returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /buckets:
    get:
      tags:
        - Buckets
      operationId: listBuckets
      summary: List buckets
      parameters:
        - $ref: '#/components/parameters/Next'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: Buckets returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBucketsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags:
        - Buckets
      operationId: createBucket
      summary: Create bucket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBucketRequest'
      responses:
        '201':
          description: Bucket created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BucketDetails'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /buckets/{bucketName}:
    get:
      parameters:
        - $ref: '#/components/parameters/BucketName'
      tags:
        - Buckets
      operationId: getBucket
      summary: Get bucket
      responses:
        '200':
          description: Bucket details returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BucketDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      parameters:
        - $ref: '#/components/parameters/BucketName'
      tags:
        - Buckets
      operationId: deleteBucket
      summary: Delete bucket
      responses:
        '204':
          description: Bucket deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /buckets/{bucketName}/versioning:
    get:
      parameters:
        - $ref: '#/components/parameters/BucketName'
      tags:
        - Buckets
      operationId: getBucketVersioning
      summary: Get bucket versioning status
      responses:
        '200':
          description: Versioning status returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersioningStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      parameters:
        - $ref: '#/components/parameters/BucketName'
      tags:
        - Buckets
      operationId: setBucketVersioning
      summary: Set bucket versioning status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VersioningStatus'
      responses:
        '200':
          description: Versioning status updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersioningStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /buckets/{bucketName}/acl:
    get:
      parameters:
        - $ref: '#/components/parameters/BucketName'
      tags:
        - Buckets
      operationId: getBucketAcl
      summary: Get bucket ACL
      responses:
        '200':
          description: Bucket ACL returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Acl'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      parameters:
        - $ref: '#/components/parameters/BucketName'
      tags:
        - Buckets
      operationId: setBucketAcl
      summary: Replace bucket ACL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Acl'
      responses:
        '200':
          description: Bucket ACL replaced.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Acl'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /buckets/{bucketName}/policy:
    get:
      parameters:
        - $ref: '#/components/parameters/BucketName'
      tags:
        - Buckets
      operationId: getBucketPolicy
      summary: Get bucket policy
      responses:
        '200':
          description: Bucket policy returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BucketPolicyDocument'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      parameters:
        - $ref: '#/components/parameters/BucketName'
      tags:
        - Buckets
      operationId: setBucketPolicy
      summary: Replace bucket policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BucketPolicyDocument'
      responses:
        '200':
          description: Bucket policy replaced.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BucketPolicyDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      parameters:
        - $ref: '#/components/parameters/BucketName'
      tags:
        - Buckets
      operationId: deleteBucketPolicy
      summary: Delete bucket policy
      responses:
        '204':
          description: Bucket policy deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /buckets/{bucketName}/lifecycle:
    get:
      parameters:
        - $ref: '#/components/parameters/BucketName'
      tags:
        - Buckets
      operationId: getBucketLifecycle
      summary: Get bucket lifecycle configuration
      responses:
        '200':
          description: Bucket lifecycle returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LifecycleConfiguration'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      parameters:
        - $ref: '#/components/parameters/BucketName'
      tags:
        - Buckets
      operationId: setBucketLifecycle
      summary: Replace bucket lifecycle configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LifecycleConfiguration'
      responses:
        '200':
          description: Bucket lifecycle replaced.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LifecycleConfiguration'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      parameters:
        - $ref: '#/components/parameters/BucketName'
      tags:
        - Buckets
      operationId: deleteBucketLifecycle
      summary: Delete bucket lifecycle configuration
      responses:
        '204':
          description: Bucket lifecycle deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /buckets/{bucketName}/multipart-uploads:
    get:
      parameters:
        - $ref: '#/components/parameters/BucketName'
        - $ref: '#/components/parameters/Next'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
      tags:
        - Buckets
      operationId: listMultipartUploads
      summary: List multipart uploads
      responses:
        '200':
          description: Multipart uploads returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMultipartUploadsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /buckets/{bucketName}/multipart-uploads/{uploadId}:
    get:
      parameters:
        - $ref: '#/components/parameters/BucketName'
        - $ref: '#/components/parameters/UploadId'
      tags:
        - Buckets
      operationId: getMultipartUpload
      summary: Get multipart upload
      responses:
        '200':
          description: Multipart upload returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultipartUpload'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      parameters:
        - $ref: '#/components/parameters/BucketName'
        - $ref: '#/components/parameters/UploadId'
      tags:
        - Buckets
      operationId: abortMultipartUpload
      summary: Abort multipart upload
      responses:
        '204':
          description: Multipart upload aborted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /buckets/{bucketName}/objects:
    get:
      parameters:
        - $ref: '#/components/parameters/BucketName'
        - $ref: '#/components/parameters/Next'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Prefix'
        - $ref: '#/components/parameters/Search'
      tags:
        - Objects
      operationId: listObjects
      summary: List blobs in a bucket
      responses:
        '200':
          description: Blobs returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListObjectsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /buckets/{bucketName}/objects/{objectKey}:
    get:
      parameters:
        - $ref: '#/components/parameters/BucketName'
        - $ref: '#/components/parameters/ObjectKey'
      tags:
        - Objects
      operationId: getObjectMetadata
      summary: Get blob metadata
      responses:
        '200':
          description: Blob metadata returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      parameters:
        - $ref: '#/components/parameters/BucketName'
        - $ref: '#/components/parameters/ObjectKey'
      tags:
        - Objects
      operationId: deleteObject
      summary: Delete blob
      responses:
        '204':
          description: Blob deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /buckets/{bucketName}/objects/{objectKey}/content:
    get:
      parameters:
        - $ref: '#/components/parameters/BucketName'
        - $ref: '#/components/parameters/ObjectKey'
      tags:
        - Objects
      operationId: downloadObjectContent
      summary: Download blob content
      responses:
        '200':
          description: Blob content returned.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      parameters:
        - $ref: '#/components/parameters/BucketName'
        - $ref: '#/components/parameters/ObjectKey'
      tags:
        - Objects
      operationId: putObjectContent
      summary: Create or replace blob content
      description: >-
        Stores arbitrary bytes for a slash-separated blob key and preserves the
        request content type when provided; otherwise the stored content type
        defaults to application/octet-stream. Request headers prefixed with
        `x-amz-meta-` are stored as blob metadata.
      requestBody:
        required: true
        content:
          '*/*':
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Blob created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectMetadata'
        '200':
          description: Blob replaced.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectMetadata'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /buckets/{bucketName}/objects/{objectKey}/versions:
    get:
      parameters:
        - $ref: '#/components/parameters/BucketName'
        - $ref: '#/components/parameters/ObjectKey'
        - $ref: '#/components/parameters/Next'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
      tags:
        - Objects
      operationId: listObjectVersions
      summary: List blob versions
      responses:
        '200':
          description: Blob versions returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListVersionsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /buckets/{bucketName}/objects/{objectKey}/versions/{versionId}:
    delete:
      parameters:
        - $ref: '#/components/parameters/BucketName'
        - $ref: '#/components/parameters/ObjectKey'
        - $ref: '#/components/parameters/VersionId'
      tags:
        - Objects
      operationId: deleteObjectVersion
      summary: Delete blob version
      responses:
        '204':
          description: Blob version deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /buckets/{bucketName}/objects/{objectKey}/tags:
    get:
      parameters:
        - $ref: '#/components/parameters/BucketName'
        - $ref: '#/components/parameters/ObjectKey'
      tags:
        - Tags
      operationId: getObjectTags
      summary: Get blob tags
      responses:
        '200':
          description: Blob tags returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      parameters:
        - $ref: '#/components/parameters/BucketName'
        - $ref: '#/components/parameters/ObjectKey'
      tags:
        - Tags
      operationId: putObjectTags
      summary: Replace blob tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagsRequest'
      responses:
        '200':
          description: Blob tags replaced.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /buckets/{bucketName}/objects/{objectKey}/acl:
    get:
      parameters:
        - $ref: '#/components/parameters/BucketName'
        - $ref: '#/components/parameters/ObjectKey'
      tags:
        - Objects
      operationId: getObjectAcl
      summary: Get blob ACL
      responses:
        '200':
          description: Blob ACL returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Acl'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      parameters:
        - $ref: '#/components/parameters/BucketName'
        - $ref: '#/components/parameters/ObjectKey'
      tags:
        - Objects
      operationId: setObjectAcl
      summary: Replace blob ACL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Acl'
      responses:
        '200':
          description: Blob ACL replaced.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Acl'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    AdminSessionCookie:
      type: apiKey
      in: cookie
      name: sqrzl_admin_session
      description: HttpOnly JWT session cookie issued by /auth/login.
  parameters:
    BucketName:
      name: bucketName
      in: path
      required: true
      description: Bucket name. Use 3-63 lowercase letters, numbers, and hyphens.
      schema:
        type: string
        minLength: 3
        maxLength: 63
        pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
    ObjectKey:
      name: objectKey
      in: path
      required: true
      description: Slash-separated blob key. URL encode the full key when used in the path.
      schema:
        type: string
        minLength: 1
        pattern: '^[A-Za-z0-9._-]+(?:/[A-Za-z0-9._-]+)*$'
    UploadId:
      name: uploadId
      in: path
      required: true
      description: Multipart upload ID.
      schema:
        type: string
        minLength: 1
    VersionId:
      name: versionId
      in: path
      required: true
      description: Object version identifier.
      schema:
        type: string
        minLength: 1
    Next:
      name: next
      in: query
      required: false
      description: Opaque next token returned by a previous list request.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return in this page.
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50
    Search:
      name: search
      in: query
      required: false
      description: Case-insensitive text search over resource names or keys.
      schema:
        type: string
    Prefix:
      name: prefix
      in: query
      required: false
      description: Restrict listing to keys that start with this prefix.
      schema:
        type: string
  responses:
    InvalidCredentials:
      description: The provided admin credentials are invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication is required or the provided admin session cookie is invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: The request could not be processed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: The request conflicts with the current resource state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: An internal emulator error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    AdminLoginRequest:
      type: object
      additionalProperties: false
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    AdminSessionResponse:
      type: object
      additionalProperties: false
      required:
        - mode
        - username
      properties:
        mode:
          type: string
          enum:
            - open
            - session
        username:
          type:
            - string
            - 'null'
    SuccessResponse:
      type: object
      additionalProperties: false
      required:
        - success
      properties:
        success:
          type: boolean
    CreateBucketRequest:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 63
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
    BucketInfo:
      type: object
      additionalProperties: false
      required:
        - name
        - created_at
        - versioning_enabled
      properties:
