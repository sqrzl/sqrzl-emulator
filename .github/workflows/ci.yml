name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update Rust toolchain
        run: rustup update stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"

      - name: Install cntryl-tools
        run: cargo install --git https://github.com/cntryl/tools --locked

      - name: Validate Test Structure
        run: cntryl-tools validate-tests

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace --all-targets --all-features

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Regenerate admin client
        working-directory: ui
        run: npm run gen

      - name: Verify generated client is up to date
        run: git diff --exit-code -- ui/src/adapters/api.g.ts

      - name: Type check
        working-directory: ui
        run: npm run type-check

      - name: Lint
        working-directory: ui
        run: npm run lint

      - name: Test
        working-directory: ui
        run: npm test

      - name: Build
        working-directory: ui
        run: npm run build
